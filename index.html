<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sávio Araujo - Desenvolvedor Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            gap: 4rem;
        }

        .hero-content {
            max-width: 500px;
        }

        .hero-image {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 1.3rem;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .tagline {
            padding: 1rem 2rem;
            border: 1px solid #333;
            border-radius: 50px;
            display: inline-block;
            color: #667eea;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                gap: 2rem;
            }
            
            .hero-image {
                width: 250px;
                height: 250px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>Olá, meu nome é Sávio Araujo</h1>
            <p class="description">
                Desenvolvedor web especializado em criar experiências digitais
                inovadoras, interfaces modernas e soluções tecnológicas
                que transformam ideias em realidade.
            </p>
            <div class="tagline">Criando o futuro, um código por vez</div>
        </div>
        <img src="perfil3.png" alt="Foto de perfil Sávio Araujo" class="hero-image">
    </section>
</body>
</html>
